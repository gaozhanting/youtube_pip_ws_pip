<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>3PiP V35 Final</title>
    <style id="v35-styles">
        body {
            margin: 0; padding: 0;
            background: #000000;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #inner-content {
            padding-top: 25px;
            padding-bottom: 30px;
            padding-left: 28px;
            padding-right: 28px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: -0.2px;
            line-height: 1.5;
            color: rgba(255, 255, 255, 0.88);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            white-space: pre-wrap;
            word-break: break-word;
            text-align: left;
            overflow: hidden;
        }
    </style>
</head>
<body style="background:#000">

    <script>
        document.title = "YT";
        let fullText = "";
        let lastProcessedText = "";
        let pipWindow = null;
        let pipInner = null;

        async function openPiP() {
            if (pipWindow) return;
            pipWindow = await window.documentPictureInPicture.requestWindow({
                width: 550, height: 400,
            });
            pipWindow.addEventListener('pagehide', () => {
                pipWindow = null;
                pipInner = null;
            });

            const style = document.createElement('style');
            style.textContent = document.getElementById('v35-styles').textContent;
            pipWindow.document.head.appendChild(style);

            pipInner = document.createElement('div');
            pipInner.id = 'inner-content';
            pipInner.textContent = fullText;
            pipWindow.document.body.appendChild(pipInner);
        }

        window.addEventListener('click', openPiP);

        // WebSocket
        function setupSocket() {
            const socket = new WebSocket('ws://localhost:8080');

            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const newInput = data.text;

                if (newInput && newInput !== lastProcessedText) {
                    if (newInput.startsWith(lastProcessedText)) {
                        let added = newInput.substring(lastProcessedText.length);
                        if (added) {
                            if (fullText.length > 0 && !fullText.endsWith(' ') && !added.startsWith(' ')) {
                                fullText += " ";
                            }
                            fullText += added;
                        }
                    } else {
                        const recentTail = fullText.slice(-150);
                        if (!recentTail.includes(newInput)) {
                            fullText += (fullText.length > 0 ? "  " : "") + newInput;
                        }
                    }
                    lastProcessedText = newInput;

                    if (pipInner) {
                        pipInner.textContent = fullText;
                        pipWindow.document.body.scrollTop = pipWindow.document.body.scrollHeight;
                    }
                }

            };

            socket.onopen = () => {
                fullText = "";
                console.log("🌊 V35 水管已接通");
            };

            socket.onclose = () => {
                setTimeout(setupSocket, 2000);
            };
        }

        setupSocket();
    </script>
</body>
</html>
